name: wordle
description: A Wordle clone built with Flutter.
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  shared_preferences: 2.2.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  provider: ^6.1.1
  intl: ^0.20.2
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.0
  google_sign_in: 6.1.6
  graphql_flutter: ^5.3.0
  flutter_dotenv: ^6.0.1

dependency_overrides:
  google_sign_in_android: 6.1.33
  shared_preferences_android: 2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_native_splash:
  color: "#121213"
  image: assets/images/logo.png
  android_12:
    color: "#121213"
    image: assets/images/logo.png
    icon_background_color: "#121213"

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D0E"
  adaptive_icon_foreground: "assets/images/logo.png"
